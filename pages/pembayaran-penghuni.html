<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kostku - Pembayaran</title>
    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/page.css" />
    <link rel="stylesheet" href="../css/table.css" />
</head>

<body>
    <div class="main">
        <!-- SIDEBAR -->
        <div id="sidebar-penghuni"></div>
        <div id="overlay" class="overlay"></div>

        <div class="main-content">
            <!-- TOPBAR -->
            <div id="topbar-penghuni"></div>

            <!-- CONTENT -->
            <main class="page pembayaran-page" id="content">
                <!-- HEADER PAGE -->
                <header class="page-header">
                    <div class="page-title">
                        <h1>Riwayat Pembayaran</h1>
                        <span class="page-description">Berikut adalah riwayat pembayaran Anda</span>
                    </div>

                </header>


                <!-- TABLE -->
                <div class="table-container">
                    <div class="table-wrapper">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Periode</th>
                                    <th>Tanggal Pembayaran</th>
                                    <th>Nominal</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>April 2026</td>
                                    <td class="text-custom">-</td>
                                    <td class="text-custom">Rp500.000</td>
                                    <td>
                                        <div><span class="badge badge-danger">Belum Lunas</span></div>
                                    </td>
                                </tr>
                                <tr>
                                    <td>Maret 2026</td>
                                    <td class="text-custom">08/03/2026</td>
                                    <td class="text-custom">Rp500.000</td>
                                    <td>
                                        <div><span class="badge badge-terisi">Lunas</span></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- SCRIPT -->
    <script src="../js/main.js"></script>
</body>

</html>
